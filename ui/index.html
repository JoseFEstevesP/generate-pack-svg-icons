<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Packer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar" role="navigation">
      <div class="sidebar-header">
        <span class="sidebar-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          SVG Packer
        </span>
      </div>
      <nav class="pack-list" id="pack-list">
        <div class="pack-list-label">Packs</div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" class="search-input" id="search" placeholder="Search icons..." autocomplete="off">
        </div>
        <div class="topbar-actions">
          <span class="icon-count" id="icon-count">0 icons</span>
          <button class="btn" id="btn-create-pack">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Create Pack
          </button>
          <button class="btn btn-primary" id="btn-generate" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Generate Pack
          </button>
        </div>
      </header>

      <section class="content" id="content">
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <h2>No icons yet</h2>
          <p>Add SVG files to a folder inside <code>icon/</code> and they will appear here.</p>
        </div>
        <div class="icon-grid" id="icon-grid"></div>
      </section>
    </main>
  </div>

    <div class="overlay" id="overlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3>Generate Pack</h3>
      <button class="btn btn-icon modal-close" id="modal-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-field">
        <label class="modal-label">Pack</label>
        <div class="modal-pack-name" id="modal-pack-name"></div>
      </div>
      <div class="modal-field">
        <label class="modal-label" for="modal-output">Output directory</label>
        <div class="modal-input-row">
          <input type="text" class="modal-input" id="modal-output" placeholder="output" autocomplete="off">
          <button class="btn btn-folder" id="btn-folder-picker" title="Browse folders">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
        <div class="modal-history" id="modal-history"></div>
      </div>
      <div class="modal-result" id="modal-result"></div>
      <div class="dir-browser" id="dir-browser" style="display:none">
        <div class="dir-browser-header">
          <span class="modal-label">Browse directories</span>
        </div>
        <div class="dir-browser-path" id="dir-browser-path"></div>
        <div class="dir-browser-list" id="dir-browser-list"></div>
        <div class="dir-browser-footer">
          <button class="btn btn-primary" id="dir-browser-select">Select this folder</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn modal-cancel" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-generate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Generate
      </button>
    </div>
  </div>

  <div class="modal create-modal" id="create-modal">
    <div class="modal-header">
      <h3>Create Custom Pack</h3>
      <button class="btn btn-icon modal-close" id="create-modal-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="create-modal-layout">
        <div class="create-modal-packs" id="create-pack-list"></div>
        <div class="create-modal-icons" id="create-pack-icons"></div>
      </div>

      <div class="selected-icons-section">
        <label class="modal-label">Selected icons (<span id="selected-count">0</span>)</label>
        <div class="selected-icons-pool" id="selected-icons-pool">
          <div class="selected-icons-empty">Pick icons from the packs, upload SVGs, or paste SVG code</div>
        </div>
      </div>

      <div class="upload-area" id="upload-area">
        <div class="upload-area-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload SVG files
        </div>
        <input type="file" class="upload-area-input" id="upload-input" accept=".svg" multiple>
      </div>

      <div class="paste-area">
        <label class="modal-label">Paste SVG</label>
        <textarea class="paste-textarea" id="paste-svg" placeholder="Paste raw SVG markup here..."></textarea>
      </div>

      <div>
        <label class="modal-label" for="create-pack-name">Pack name</label>
        <div class="create-name-row">
          <input type="text" class="create-name-input" id="create-pack-name" placeholder="my-custom-pack" autocomplete="off">
          <button class="btn btn-primary" id="btn-create-submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Create Pack
          </button>
        </div>
      </div>

      <div class="create-error" id="create-error"></div>
      <div class="create-success" id="create-success" style="display:none"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
